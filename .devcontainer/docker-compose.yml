services: 
    server:
        build: .
        image: dev-image-ai-ml
        user: ubuntu
        environment: 
            - TZ=Asia/Singapore
        volumes:
            - ..:/workspaces/playground-ai-ml:delegated
            - ../../shared-data:/workspaces/shared-data:delegated
        working_dir: /workspaces/playground-ai-ml
